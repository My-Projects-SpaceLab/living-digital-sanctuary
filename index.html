<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Digital Sanctuary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hud">
        State: <span id="hud-state">Flow</span><br>
        Typing Speed: <span id="hud-speed">0</span> cpm<br>
        Idle Time: <span id="hud-idle">0</span>s
    </div>

    <div id="workspace-container">
        <div id="editor-card">
            <input type="text" id="editor-title" placeholder="Untitled Sanctuary Note...">
            <textarea id="editor-textarea" placeholder="Start typing your thoughts here... Observe how the background field breathes and shifts colors depending on how fast or slow you type. Stop typing for 5 seconds to enter deep restoration."></textarea>
        </div>
    </div>

    <div id="state-label">flow</div>
    <button id="share-btn">Share Space</button>

    <canvas id="canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
