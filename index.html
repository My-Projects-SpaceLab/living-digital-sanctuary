<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Living Digital Sanctuary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020406;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Glassmorphic editor interface */
        #workspace-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #editor-card {
            width: 90%;
            max-width: 650px;
            height: 60%;
            background: rgba(8, 12, 18, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), background 1s, border-color 1s;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            opacity: 1;
        }

        #editor-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            outline: none;
            border: none;
            background: transparent;
            font-style: italic;
        }

        #editor-textarea {
            width: 100%;
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            line-height: 1.8;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
        }

        #editor-textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        /* Subtle HUD dashboard */
        #hud {
            position: fixed;
            top: 30px;
            left: 40px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 2;
            pointer-events: none;
            user-select: none;
        }

        #hud span {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        #state-label {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            letter-spacing: 8px;
            text-transform: uppercase;
            pointer-events: none;
            transition: color 1s;
            user-select: none;
            font-style: italic;
        }

        #share-btn {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
            pointer-events: auto;
        }

        #share-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div id="hud">
        State: <span id="hud-state">Flow</span><br>
        Typing Speed: <span id="hud-speed">0</span> cpm<br>
        Idle Time: <span id="hud-idle">0</span>s
    </div>

    <div id="workspace-container">
        <div id="editor-card">
            <input type="text" id="editor-title" placeholder="Untitled Sanctuary Note...">
            <textarea id="editor-textarea"
                placeholder="Start typing your thoughts here... Observe how the background field breathes and shifts colors depending on how fast or slow you type. Stop typing for 5 seconds to enter deep restoration."></textarea>
        </div>
    </div>

    <div id="state-label">flow</div>
    <button id="share-btn">Share Space</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const label = document.getElementById('state-label');
        const card = document.getElementById('editor-card');

        const hudState = document.getElementById('hud-state');
        const hudSpeed = document.getElementById('hud-speed');
        const hudIdle = document.getElementById('hud-idle');

        const textarea = document.getElementById('editor-textarea');

        let W = 0, H = 0;

        // ── RESIZE ───────────────────────────────────────────────────────
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ── INTERACTION SENSING ──────────────────────────────────────────
        let lastActive = Date.now();
        let keyTimes = [];
        let cpm = 0;

        textarea.addEventListener('input', () => {
            const now = Date.now();
            lastActive = now;
            keyTimes.push(now);
        });

        setInterval(() => {
            const now = Date.now();
            keyTimes = keyTimes.filter(t => now - t < 10000);
            cpm = Math.round(keyTimes.length * 6);
            hudSpeed.textContent = cpm;

            const idleSecs = Math.round((now - lastActive) / 1000);
            hudIdle.textContent = idleSecs;
        }, 500);

        // ── STATE ENGINE (SPEEDED UP FOR CAPTURE/DEMONSTRATION) ──────────
        let stateBlend = 0;
        let targetBlend = 0;
        let stateName = 'flow';
        let currentCardOpacity = 1.0;

        function updateState() {
            const idleSecs = (Date.now() - lastActive) / 1000;

            // Fast-acting thresholds:
            // 6 seconds idle -> RESTORE (Orange)
            // 2 seconds idle -> DRIFT (Green)
            if (idleSecs > 4.0) {
                targetBlend = 1.0;
            } else if (idleSecs > 1.5 || cpm < 40) {
                targetBlend = 0.5;
            } else if (cpm > 180) {
                targetBlend = 0.0;
            } else {
                targetBlend = Math.max(0, Math.min(0.5, 0.5 - (cpm - 40) / 280));
            }

            let targetCardOpacity = 1.0;
            if (idleSecs > 4.0) {
                targetCardOpacity = 0.04;
            } else if (idleSecs > 1.0) {
                targetCardOpacity = 0.55;
            } else {
                targetCardOpacity = 1.0;
            }

            const isWakingUp = (targetCardOpacity > currentCardOpacity);

            // Lerp speeds dramatically increased so transitions occur in ~3-4 seconds
            const cardLerp = isWakingUp ? 0.25 : 0.06;
            const blendLerp = isWakingUp ? 0.18 : 0.06;

            currentCardOpacity += (targetCardOpacity - currentCardOpacity) * cardLerp;
            stateBlend += (targetBlend - stateBlend) * blendLerp;

            card.style.opacity = currentCardOpacity.toFixed(3);

            if (stateBlend < 0.25) {
                stateName = 'flow';
                card.style.transform = 'scale(1)';
                card.style.background = 'rgba(8, 12, 18, 0.65)';
                card.style.borderColor = 'rgba(255, 255, 255, 0.08)';
            } else if (stateBlend < 0.7) {
                stateName = 'drift';
                card.style.transform = 'scale(0.98)';
                card.style.background = 'rgba(8, 12, 18, 0.4)';
                card.style.borderColor = 'rgba(255, 255, 255, 0.04)';
            } else {
                stateName = 'restore';
                card.style.transform = 'scale(0.96)';
            }

            const prev = label.textContent;
            if (stateName !== prev) {
                label.textContent = stateName;
                hudState.textContent = stateName.charAt(0).toUpperCase() + stateName.slice(1);
            }
        }

        // ── FLOW FIELD ───────────────────────────────────────────────────
        function fieldAngle(x, y, t) {
            const sc = 0.0012 + stateBlend * 0.0004;
            return Math.sin(x * sc + t * 0.25) * Math.PI
                + Math.cos(y * sc + t * 0.18) * Math.PI
                + Math.sin((x + y) * sc * 0.6 + t * 0.12) * Math.PI * 0.5;
        }

        // ── COLOR SHIFT (BLUE → GREEN → ORANGE) ──────────────────────────
        function particleColor(hueVariant, alpha) {
            let h;
            if (stateBlend < 0.5) {
                const t = stateBlend / 0.5;
                h = 205 + (140 - 205) * t;
            } else {
                const t = (stateBlend - 0.5) / 0.5;
                h = 140 + (26 - 140) * t;
            }

            h += hueVariant * 16 - 8;
            const s = 76 - stateBlend * 12;
            const l = 50 + stateBlend * 12;
            return `hsla(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%, ${alpha.toFixed(3)})`;
        }

        // ── PARTICLES ────────────────────────────────────────────────────
        const PARTICLE_COUNT = 850;
        const TAIL_LEN = 28;

        class Particle {
            constructor() { this.init(true); }

            init(scatter) {
                this.x = scatter ? Math.random() * W : (Math.random() < 0.5 ? -10 : W + 10);
                this.y = scatter ? Math.random() * H : Math.random() * H;
                this.vx = 0;
                this.vy = 0;
                this.spd = 0.4 + Math.random() * 0.9;
                this.life = 0;
                this.maxL = 220 + Math.random() * 380;
                this.hv = Math.random();
                this.sz = 0.7 + Math.random() * 1.5;
                this.trail = [];
            }

            update(t) {
                this.life++;
                const sm = 1.0 - stateBlend * 0.5;

                const ang = fieldAngle(this.x, this.y, t);
                this.vx += Math.cos(ang) * 0.08 * sm;
                this.vy += Math.sin(ang) * 0.08 * sm;

                const damp = 0.92 + stateBlend * 0.045;
                this.vx *= damp;
                this.vy *= damp;

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > TAIL_LEN) this.trail.shift();

                this.x += this.vx * this.spd;
                this.y += this.vy * this.spd;

                if (this.life > this.maxL || this.x < -80 || this.x > W + 80 || this.y < -80 || this.y > H + 80) {
                    this.init(false);
                }
            }

            draw() {
                if (this.trail.length < 2) return;
                const lifeA = Math.min(1, this.life / 40) * Math.min(1, (this.maxL - this.life) / 40);

                for (let i = 1; i < this.trail.length; i++) {
                    const t = i / this.trail.length;
                    const alp = t * lifeA * (0.28 + stateBlend * 0.16);
                    const lw = t * this.sz * 1.5;

                    ctx.beginPath();
                    ctx.strokeStyle = particleColor(this.hv, alp);
                    ctx.lineWidth = lw;
                    ctx.lineCap = 'round';
                    ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    ctx.stroke();
                }
            }
        }

        let particles = [];
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        }
        initParticles();

        // ── BREATHING GLOW ───────────────────────────────────────────────
        let breathPhase = 0;
        function drawBreath() {
            const vis = Math.max(0, (stateBlend - 0.25) / 0.75);
            if (vis <= 0) return;

            breathPhase += 0.005;
            const pulse = Math.sin(breathPhase) * 0.5 + 0.5;
            const radius = Math.min(W, H) * (0.22 + pulse * 0.12);
            const alpha = vis * 0.06 * pulse;

            const grd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, radius);
            grd.addColorStop(0, `hsla(${26 + stateBlend * 10}, 65%, 65%, ${alpha.toFixed(3)})`);
            grd.addColorStop(0.6, `hsla(${26 + stateBlend * 10}, 50%, 45%, ${(alpha * 0.3).toFixed(3)})`);
            grd.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.beginPath();
            ctx.fillStyle = grd;
            ctx.arc(W / 2, H / 2, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // ── VIGNETTE ─────────────────────────────────────────────────────
        function drawVignette() {
            const str = 0.45 + stateBlend * 0.2;
            const grd = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.95);
            grd.addColorStop(0, 'rgba(0,0,0,0)');
            grd.addColorStop(1, `rgba(2, 4, 6, ${str.toFixed(2)})`);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, W, H);
        }

        // ── MAIN LOOP ────────────────────────────────────────────────────
        let t = 0;
        function loop() {
            t += 0.004;
            updateState();

            const fade = 0.038 + (1 - stateBlend) * 0.035;
            ctx.fillStyle = `rgba(2, 4, 6, ${fade.toFixed(3)})`;
            ctx.fillRect(0, 0, W, H);

            const active = Math.floor(PARTICLE_COUNT * (0.8 + (1 - stateBlend) * 0.2));
            for (let i = 0; i < active; i++) {
                particles[i].update(t);
                particles[i].draw();
            }

            drawBreath();
            drawVignette();

            requestAnimationFrame(loop);
        }
        loop();

        // ── SHARE SPACE SIMULATOR ────────────────────────────────────────
        document.getElementById('share-btn').addEventListener('click', () => {
            alert("Simulation: Custom space saved! Your link: \n\nfile:///C:/Users/varal/Desktop/sanctuary.html?state=" + stateName);
        });
    </script>
</body>

</html>
