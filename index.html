<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Digital Sanctuary</title>
    <meta name="description" content="A screen that restores you. No login. No notifications. Just open it.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- HUD top left -->
    <div id="hud">
        State: <span id="hud-state">Flow</span><br>
        Typing: <span id="hud-speed">0</span> cpm<br>
        Idle: <span id="hud-idle">0s</span>
    </div>

    <!-- About link top right — fades in after 30s -->
    <a id="about-link" href="https://my-projects-spacelab.github.io/living-digital-sanctuary/about.html">about</a>

    <!-- Editor -->
    <div id="workspace-container">
        <div id="editor-card">
            <input type="text" id="editor-title" placeholder="Untitled note...">
            <textarea id="editor-textarea"></textarea>
        </div>
    </div>

    <!-- Privacy notice bottom centre — replaces state label -->
    <div id="privacy-notice">
        <p>No data leaves your browser &nbsp;·&nbsp; nothing is stored</p>
    </div>

    <!-- Share button bottom right — fades in after 30s -->
    <button id="share-btn">share this space</button>

    <!-- 5-min prompt overlay -->
    <div id="prompt-overlay" role="dialog">
        <p id="prompt-question">You've been here a while.<br>How do you feel?</p>
        <div id="prompt-choices">
            <button class="prompt-choice-btn" id="btn-better">Feeling better</button>
            <button class="prompt-choice-btn" id="btn-calm">Calm</button>
            <button id="btn-notsure">Not sure yet</button>
        </div>
        <div id="prompt-comment">
            <textarea id="comment-text" placeholder="Anything you want to say about it — or nothing at all."></textarea>
            <button id="btn-submit-comment">Continue →</button>
        </div>
        <div id="share-card" hidden>
            <p class="share-intro">Something peaceful, for someone you care about.</p>
            <p id="share-url">living-digital-sanctuary.space</p>
            <div class="btn-row">
                <button id="btn-copy-link">Copy link</button>
                <button id="btn-native-share">Share →</button>
            </div>
            <button id="btn-dismiss" class="dismiss">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
